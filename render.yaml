services:
  - type: web
    name: proyectmeluuu-api
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SESSION_TTL
        value: 300000
      - key: POLLING_INTERVAL
        value: 2000
      - key: CORS_ORIGIN
        value: "*"
